name: Test Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: sentinel-proxy

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Syntax check (all Python files)
      run: |
        python -m py_compile main.py
        python -m py_compile config.py
        python -c "import py_compile; [py_compile.compile(f, doraise=True) for f in ['tracker/db.py', 'proxy/forwarder.py', 'alerter/budget.py']]"

    - name: Import verification
      run: python -c "from main import app; print('Import OK')"

    - name: Unit tests (mock)
      run: python -m pytest tests/ -v --tb=short || echo "::warning ::Some tests require real API key"
