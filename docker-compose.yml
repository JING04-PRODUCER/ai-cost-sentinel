version: "3.8"

services:
  sentinel-proxy:
    build: ./sentinel-proxy
    ports:
      - "${SENTINEL_PORT:-8000}:8000"
    environment:
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://api.openai.com/v1}
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:-}
      - SENTINEL_ADMIN_TOKEN=${SENTINEL_ADMIN_TOKEN:-}
      - SENTINEL_BUDGET_MODE=${SENTINEL_BUDGET_MODE:-notify_only}
      - SENTINEL_WEBHOOK_URL=${SENTINEL_WEBHOOK_URL:-}
    volumes:
      - sentinel-data:/app
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - sentinel-data:/data
    environment:
      - DB_PATH=/data/sentinel.db
    depends_on:
      - sentinel-proxy
    restart: unless-stopped

volumes:
  sentinel-data:
